<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinesis.js Playground</title>
  </head>
  <body>
    <div id="app">
      <aside id="panel">
        <h1>Kinesis.js</h1>
        <p class="sub">Playground — OpenLayers &amp; Leaflet</p>

        <fieldset>
          <legend>Map adapter</legend>
          <label><input type="radio" name="adapter" value="openlayers" checked /> OpenLayers</label>
          <label><input type="radio" name="adapter" value="leaflet" /> Leaflet</label>
        </fieldset>

        <fieldset>
          <legend>Interpolation</legend>
          <select id="interpolation">
            <option value="linear">linear</option>
            <option value="cubic">cubic</option>
            <option value="geodesic">geodesic</option>
            <option value="adaptive" selected>adaptive</option>
            <option value="none">none</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Fleet</legend>
          <label
            >Vehicles <output id="countOut">200</output>
            <input type="range" id="count" min="1" max="2000" step="1" value="200" />
          </label>
          <label
            >Update period (ms) <output id="periodOut">2000</output>
            <input type="range" id="period" min="200" max="10000" step="100" value="2000" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Options</legend>
          <label><input type="checkbox" id="worker" /> Web Worker mode</label>
          <label><input type="checkbox" id="trail" /> Trails</label>
          <label><input type="checkbox" id="speed" checked /> Speed-band colours</label>
          <label><input type="checkbox" id="gapviz" checked /> Gap dimming (warningOpacity)</label>
        </fieldset>

        <fieldset>
          <legend>Scenarios</legend>
          <button id="btnGap" type="button">Signal gap → warning → stale</button>
          <button id="btnJump" type="button">Anomalous jump</button>
          <button id="btnComplete" type="button">Mark one completed</button>
          <button id="btnToggleRun" type="button">Pause feed</button>
        </fieldset>

        <fieldset>
          <legend>Live stats</legend>
          <pre id="stats">—</pre>
        </fieldset>
      </aside>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
