name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    name: Version or Publish
    if: github.repository == 'kinesisjs/kinesis.js'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Create one GitHub release per published package version, with body
          # auto-filled from that package's CHANGELOG.md entry. Per-package
          # releases give npm consumers a click-through "release notes" link
          # straight from each @kinesisjs/<pkg>@x.y.z npm page. Umbrella vX.Y.Z
          # tags + releases (curated highlights) are still created by hand on
          # release days where we want a human summary across packages.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN here — Trusted Publishing on npm (per-package, see
          # documents/design/release-runbook.md §9) + `id-token: write` above
          # mints a short-lived OIDC token at publish time. The legacy
          # NPM_TOKEN repo secret can be removed once all 3 packages have
          # their Trusted Publisher configured.
          NPM_CONFIG_PROVENANCE: true
