name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance + Trusted Publishing OIDC

jobs:
  release:
    name: Version or Publish
    if: github.repository == 'kinesisjs/kinesis.js'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        # `registry-url` is intentionally NOT set. With it, actions/setup-node
        # writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into
        # ~/.npmrc. Under Trusted Publishing we don't set NODE_AUTH_TOKEN, and
        # an empty token line can mask the OIDC flow on some npm versions.
        # The registry default is registry.npmjs.org anyway, so omitting this
        # is purely defensive.
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade tool-cache npm to >=11.5 (required for Trusted Publishing)
        # Node 22.x ships with npm 10.x. npm's automatic OIDC Trusted
        # Publishing flow landed in npm 11.5 — older npm CLIs see the
        # ACTIONS_ID_TOKEN_REQUEST_* env vars and ignore them, and every
        # publish fails with ENEEDAUTH (or, when wrapped by changesets/action,
        # surfaces as an opaque 404). Without this upgrade, no release in
        # this repo could ever publish via TP.
        #
        # We deliberately avoid `sudo`: sudo strips PATH and the install
        # lands in /usr/local/lib/node_modules, leaving the tool-cache npm
        # (the one `which npm` resolves to) at 10.x. Plain `npm install -g`
        # writes into setup-node's tool cache, which is owned by the runner
        # user and is what every downstream step actually invokes.
        run: |
          npm install -g npm@latest
          echo "npm: $(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git author for release commits
        # changesets/action below uses git config to set author on the
        # "Version Packages" commit; without these two lines it falls back to
        # `github-actions[bot]`, which then shows up in the repo's Contributors
        # sidebar. Setting an explicit maintainer identity keeps the bot off
        # the contributors list for all future releases. Historical bot commits
        # are remapped via .mailmap.
        run: |
          git config user.name "Muzaffer AŞKAR"
          git config user.email "muh.muzafferaskar@gmail.com"

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Create one GitHub release per published package version, with body
          # auto-filled from that package's CHANGELOG.md entry. Per-package
          # releases give npm consumers a click-through "release notes" link
          # straight from each @kinesisjs/<pkg>@x.y.z npm page. Umbrella vX.Y.Z
          # tags + releases (curated highlights) are still created by hand on
          # release days where we want a human summary across packages.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — Trusted Publishing on npm (per-package, see
          # documents/design/release-runbook.md §9) + `id-token: write` above
          # mints a short-lived OIDC token at publish time.
          NPM_CONFIG_PROVENANCE: true
