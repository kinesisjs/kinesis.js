name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    name: Version or Publish
    if: github.repository == 'kinesisjs/kinesis.js'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        # IMPORTANT: registry-url is intentionally NOT set here. When set,
        # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
        # into ~/.npmrc. With Trusted Publishing we don't set NODE_AUTH_TOKEN, so
        # npm CLI sees an empty bearer token, assumes "already authenticated", and
        # SKIPS the OIDC token exchange entirely — every publish then 404s. The
        # default registry is registry.npmjs.org anyway, so registry-url is
        # superfluous; omitting it lets npm CLI run its TP flow correctly.
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Belt-and-braces: scrub any stale _authToken lines that another tool
      # (e.g. pnpm's setup) may have written. Without this, npm CLI may still
      # skip the OIDC exchange.
      - name: Clean .npmrc of any _authToken lines (forces TP OIDC flow)
        run: |
          for f in "$HOME/.npmrc" "$NPM_CONFIG_USERCONFIG" "$GITHUB_WORKSPACE/.npmrc"; do
            if [ -n "${f:-}" ] && [ -f "$f" ]; then
              echo "Scrubbing _authToken from $f"
              sed -i.bak '/_authToken/d' "$f"
            fi
          done
          echo "--- effective npm config (auth-related) ---"
          npm config list -l 2>&1 | grep -iE 'registry|auth|token' || true

      - name: Configure git author for release commits
        # changesets/action below uses git config to set author on the
        # "Version Packages" commit; without these two lines it falls back to
        # `github-actions[bot]`, which then shows up in the repo's Contributors
        # sidebar. Setting an explicit maintainer identity keeps the bot off
        # the contributors list for all future releases. Historical bot commits
        # are remapped via .mailmap.
        run: |
          git config user.name "Muzaffer AŞKAR"
          git config user.email "muh.muzafferaskar@gmail.com"

      - name: Build
        run: pnpm build

      # TEMP DEBUG (remove after TP issue resolved): dump OIDC claims so we
      # can compare what release.yml's push-trigger OIDC token contains vs.
      # what npm's Trusted Publisher rule expects (release.yml + repo +
      # owner). Round 6 of debug-oidc.yml proved exchange works under a
      # workflow_dispatch trigger — this step verifies whether the push
      # trigger here produces different claims.
      - name: 'DEBUG: dump OIDC claims for TP analysis'
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r '.value')
          PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2)
          echo "================================================================"
          echo "OIDC claims (audience=npm:registry.npmjs.org) from release.yml"
          echo "================================================================"
          python3 -c "
          import base64, json
          b = '''$PAYLOAD'''
          b += '=' * ((4 - len(b) % 4) % 4)
          claims = json.loads(base64.urlsafe_b64decode(b))
          drop = {'iat','exp','nbf','jti'}
          identity = {k: v for k, v in claims.items() if k not in drop}
          print(json.dumps(identity, indent=2, sort_keys=True))
          "

      # TEMP DEBUG: bypass changesets/action so we can capture the actual
      # HTTP trace (--loglevel=http) of the publish call. changesets/action
      # silently swallows http logs, leaving us with only the opaque 404.
      # First attempt the changesets version PR flow; if there's no pending
      # version PR (i.e. nothing to version), skip straight to direct
      # publish of all 3 packages with full HTTP logging.
      - name: 'DEBUG: direct npm publish with full HTTP trace'
        run: |
          set -euxo pipefail
          for pkg in core openlayers angular; do
            echo ""
            echo "================================================================"
            echo "Publishing @kinesisjs/$pkg with --loglevel=http"
            echo "================================================================"
            (
              cd "packages/$pkg"
              npm publish --provenance --access=public --loglevel=http 2>&1 | tail -80 || true
            )
          done
        env:
          NPM_CONFIG_PROVENANCE: true
