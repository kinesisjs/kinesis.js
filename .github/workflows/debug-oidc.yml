name: Debug OIDC (temporary, v0.2.2 investigation)

# Manual-trigger workflow that fetches the GitHub Actions OIDC token with the
# same audience npm uses (`npm:registry.npmjs.org`) and probes the npm registry
# with it. Each probe surfaces the exact response code + body so we can see
# what npm rejects (the publish PUT masks every failure as 404).
#
# Delete this workflow file once the Trusted Publishing E404 is resolved.

on:
  workflow_dispatch:

jobs:
  probe-npm-with-oidc:
    name: Probe npm registry endpoints with the OIDC token
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Fetch OIDC token, decode claims, probe registry
        run: |
          set -euo pipefail
          AUDIENCE="npm:registry.npmjs.org"
          UA="npm/10.9.2 node/22 linux x64"

          echo "Requesting OIDC token with audience='$AUDIENCE'"
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            | jq -r '.value')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: failed to fetch OIDC token. Check id-token: write permission."
            exit 1
          fi

          # ── 1) Decode and print OIDC claims (no token leakage; payload only) ──
          PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2)
          echo ""
          echo "=================================================================="
          echo "1) OIDC token claims (audience=$AUDIENCE)"
          echo "=================================================================="
          python3 -c "
          import base64, json
          b = '''$PAYLOAD'''
          b += '=' * ((4 - len(b) % 4) % 4)
          claims = json.loads(base64.urlsafe_b64decode(b))
          drop = {'iat','exp','nbf','jti'}
          identity = {k: v for k, v in claims.items() if k not in drop}
          print(json.dumps(identity, indent=2, sort_keys=True))
          "

          # ── 2) GET /-/whoami with OIDC bearer ──
          # If npm accepts the OIDC token as a valid identity (even read-only),
          # this returns 200 with a username body. A 401/403 here means the
          # registry doesn't recognize the OIDC token at all — Trusted Publisher
          # rule isn't matching.
          echo ""
          echo "=================================================================="
          echo "2) GET /-/whoami with OIDC bearer"
          echo "=================================================================="
          curl -sS -i \
            -H "Authorization: Bearer $TOKEN" \
            -H "User-Agent: $UA" \
            -H "npm-auth-type: oidc" \
            https://registry.npmjs.org/-/whoami \
            | head -40 || true

          # ── 3) GET package metadata (anonymous-readable, but try bearer) ──
          echo ""
          echo "=================================================================="
          echo "3) GET @kinesisjs/openlayers package metadata"
          echo "=================================================================="
          curl -sS -i \
            -H "Authorization: Bearer $TOKEN" \
            -H "User-Agent: $UA" \
            https://registry.npmjs.org/@kinesisjs%2Fopenlayers \
            | head -20 || true

          # ── 4) PUT a sham 0.99.99-debug version to /@kinesisjs/openlayers ──
          # We send a malformed minimal manifest deliberately — npm will reject
          # it on auth BEFORE manifest validation if the OIDC token isn't
          # accepted. The response body usually includes a real reason for
          # the rejection (instead of the cryptic 404 we get from real
          # publishes via pnpm).
          echo ""
          echo "=================================================================="
          echo "4) PUT a probe version with the OIDC bearer (registry will reject;"
          echo "   we want the *reason* in the response body)"
          echo "=================================================================="
          PROBE_BODY='{"name":"@kinesisjs/openlayers","versions":{"0.99.99-tp-debug":{"name":"@kinesisjs/openlayers","version":"0.99.99-tp-debug"}}}'
          curl -sS -i -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "User-Agent: $UA" \
            -H "Content-Type: application/json" \
            -H "npm-auth-type: oidc" \
            -d "$PROBE_BODY" \
            https://registry.npmjs.org/@kinesisjs%2Fopenlayers \
            | head -60 || true

          # ── 5) Scan candidate OIDC exchange endpoints (the first probe at
          #       /-/npm/v1/oidc/token/exchange returned ResourceNotFound, so
          #       npm uses a different path or scheme entirely).
          echo ""
          echo "=================================================================="
          echo "5) Endpoint scan — POST OIDC body to candidate paths"
          echo "=================================================================="
          BODY=$(python3 -c "import json,sys; print(json.dumps({'id_token': sys.stdin.read().strip()}))" <<< "$TOKEN")
          for path in \
            '/-/npm/v1/oidc/exchange' \
            '/-/npm/v1/oidc/token' \
            '/-/npm/v1/tokens' \
            '/-/oidc/token/exchange' \
            '/-/oidc/exchange' \
            '/-/v1/oidc/registry' \
            '/-/npm/v1/oidc/registry'; do
            STATUS=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST \
              -H "User-Agent: $UA" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "https://registry.npmjs.org$path")
            BODY_SUMMARY=$(head -c 300 /tmp/resp.json | tr -d '\n')
            echo "[$STATUS] POST $path → $BODY_SUMMARY"
          done

          # ── 6) Probe npm CLI directly. Use sudo for the global install (the
          #     previous round failed without it). Then capture --loglevel=http
          #     output from `npm whoami` — that dumps every URL npm hits, which
          #     reveals whether npm CLI has any internal exchange step we'd be
          #     missing in pnpm's publish path.
          echo ""
          echo "=================================================================="
          echo "6) npm CLI HTTP trace — what URLs does npm actually call?"
          echo "=================================================================="
          sudo npm install -g npm@latest 2>&1 | tail -2 || true
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"

          NPMRC=$(mktemp)
          chmod 600 "$NPMRC"
          printf 'registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$TOKEN" > "$NPMRC"

          echo ""
          echo "--- npm whoami --loglevel=http (every HTTP request npm makes) ---"
          NPM_CONFIG_USERCONFIG="$NPMRC" \
          NPM_CONFIG_PROVENANCE=true \
          ACTIONS_ID_TOKEN_REQUEST_URL="$ACTIONS_ID_TOKEN_REQUEST_URL" \
          ACTIONS_ID_TOKEN_REQUEST_TOKEN="$ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            npm whoami --loglevel=http 2>&1 | tail -40 || true

          # Real publish attempt against a unique prerelease version. Tagged
          # `debug` to satisfy npm's prerelease rule. We want the registry to
          # reject this (we expect 404), but with --loglevel=http we capture
          # the full PUT request/response — including any error body that
          # explains the rejection.
          echo ""
          echo "--- real npm publish --provenance with full HTTP trace ---"
          PKGDIR=$(mktemp -d)
          VERSION="0.99.99-tp-debug-$(date +%s)"
          cat > "$PKGDIR/package.json" <<JSON
          {
            "name": "@kinesisjs/openlayers",
            "version": "$VERSION",
            "description": "TP debug probe — should NOT publish",
            "publishConfig": { "access": "public" }
          }
          JSON
          (
            cd "$PKGDIR"
            NPM_CONFIG_USERCONFIG="$NPMRC" \
            NPM_CONFIG_PROVENANCE=true \
            ACTIONS_ID_TOKEN_REQUEST_URL="$ACTIONS_ID_TOKEN_REQUEST_URL" \
            ACTIONS_ID_TOKEN_REQUEST_TOKEN="$ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              npm publish --provenance --access=public --tag=debug --loglevel=http 2>&1 | tail -80 || true
          )

          rm -rf "$NPMRC" "$PKGDIR"

          echo ""
          echo "=================================================================="
          echo "What to look for in the npm output above:"
          echo "  - 'http fetch GET ...' lines name the real endpoints npm hits"
          echo "  - any 'oidc' / 'trusted' / 'exchange' in the log → the actual URL"
          echo "  - whoami → 200 means OIDC works at CLI level (pnpm publish bug)"
          echo "  - whoami → 401 + same in dry-run → npm CLI also can't TP here;"
          echo "    next step is npm support / re-pair Trusted Publisher in UI"
          echo "=================================================================="
